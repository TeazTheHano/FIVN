    #Partner #Partner_content {
      text-align: center;
    }

    #Partner #Partner_content_cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--spacing-m);
      justify-content: center;
      overflow: hidden;
      padding: var(--spacing-l);
    }

    @media (max-width: 768px) {
      #Partner #Partner_content_cards {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    #Partner #Partner_content_cards .partner-item {
      width: 100%;
      height: 100px;
    }

    #Partner #Partner_content_cards .partner-item img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #Partner #Partner_content_cards .partner-item:hover {
      transform: scale(1.1);
    }
