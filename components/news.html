<div>
  <style>
    #News {
      background-color: var(--color-bg-light);
    }

    /* ================= News Content ================= */

    #News #News_content {
      gap: var(--spacing-m);
      padding-bottom: var(--spacing-l);
    }

    /* ---------- Category list ---------- */

    #News #News_content #News_content_cate_list {
      justify-content: space-between;
      width: 100%;
    }

    #News #News_content #News_content_cate_list div:first-child {
      flex-wrap: wrap;
    }

    #News #News_content_cards .card {
      display: none;
    }

    /* ---------- Card Top ---------- */

    #News #News_content_cards .card .top {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
    }

    #News #News_content_cards .card .top img {
      height: 100%;
      width: 100%;
    }

    #News #News_content_cards .card .top .tag {
      position: absolute;
      top: var(--spacing-s);
      right: var(--spacing-s);
      z-index: 1;

      font-size: var(--t-mini-size);
      font-weight: var(--weight-bold);
      letter-spacing: normal;

      color: var(--color-secondary);
      background-color: var(--color-white);

      padding: var(--spacing-xxxs) var(--spacing-xs);
      border-radius: var(--radius-round);
    }

    #News #News_content_cards .card .top .tag::before {
      content: "";
    }

    /* ---------- Card Bottom ---------- */

    #News #News_content_cards .card .bottom {
      padding: var(--spacing-m);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-s);

      font-size: var(--t-subbody-size);
      color: var(--color-gray-800);
      font-weight: var(--weight-thin);
    }

    #News #News_content_cards .card .bottom span {
      color: var(--color-primary);
      font-size: var(--t-body-size) !important;
    }

    #News #News_content_cards .card .bottom h4 {
      font-size: var(--t-body-size);
      line-height: var(--t-subbody-lh);
    }

    #News #News_content_cards .card .bottom h4 + div p {
      font-size: var(--t-mini-size);
    }

    #News #News_content_cards .card .bottom h4 + div div:first-child p {
      font-weight: var(--weight-semibold);
    }

    #News #News_content_cards .card .bottom .description * {
      font-size: var(--t-subbody-size);
      line-height: var(--t-subbody-lh);
    }

    #News #News_content_cards .card .bottom .btn {
      text-decoration: none;
    }

    #News #News_content_cards .card .goto-button {
      color: var(--color-black);
      font-size: var(--t-subbody-size);
      font-weight: var(--weight-semibold);
      line-height: var(--t-subbody-lh);
      text-decoration: none;
    }

    /* ---------- Hover ---------- */

    #News #News_content_cards .card:hover {
      transform: translateY(calc(-1 * var(--spacing-xxxs)));
      filter: drop-shadow(var(--shadow-xl)) drop-shadow(var(--shadow-m));
    }

    #News #News_content_cards .card:hover .top img {
      transform: scale(1.1);
    }

    #News #News_content_cards .card .goto-button:hover {
      color: var(--color-secondary);
    }

    /* ALL */
    #News:has(input[name="News_content_cate"][value="all"]:checked)
      #News_content_cards
      > .card {
      display: block;
    }
  </style>

  <style
    repeat="category|param:parentId:32268aae-7506-94dd-1bae-850a60f2e3d2|sort:displayOrder:asc|includes:"
  >
    /* ================= Active category button ================= */

    #News #News_content_cate_list .button-chip:has(input:checked) {
      background-color: var(--color-secondary);
      color: var(--color-white);
    }

    /* ================= Show cards by category ================= */

    /* CATEGORY */
    #News:has(input[name="News_content_cate"][value="{{name}}"]:checked)
      #News_content_cards
      > .card[course-cate*="{{name}}"] {
      display: block;
    }
  </style>

  <section id="News" class="relative">
    <div id="News_content" class="maxWidth1300 d-column-h-center gap-m">
      <div class="d-column-h-center gap-xs">
        <p class="tag" binding-name="Kiến thức & Xu hướng">
          Kiến thức & Xu hướng
        </p>
        <h2 class="title-bold" binding-name="Tin tức & Góc nhìn">
          Tin tức & Góc nhìn
        </h2>
      </div>

      <!-- ================= Category list ================= -->

      <div class="d-row-v-center gap-m" id="News_content_cate_list">
        <div class="d-row gap-xxs">
          <!-- ALL -->
          <label class="button-chip">
            <input
              type="radio"
              name="News_content_cate"
              hidden
              value="all"
              checked
            />
            Tất cả
          </label>

          <!-- CATEGORY -->
          <label
            repeat="category|param:parentId:32268aae-7506-94dd-1bae-850a60f2e3d2|sort:displayOrder:asc|includes:"
            class="button-chip"
          >
            <input
              type="radio"
              name="News_content_cate"
              hidden
              value="{{name}}"
            />
            {{name}}
          </label>
        </div>
      </div>
    </div>

    <!-- ================= Cards ================= -->

    <div id="News_content_cards" class="maxWidth1300 cards-slider-container">
      <!-- Controller -->
      <div class="cards-slider-controller mobileHide gap-xxs">
        <div class="cards-slider-controller-prev button-primary button-rounded">
          <span class="material-symbols-outlined"> chevron_left </span>
        </div>
        <div class="cards-slider-controller-next button-primary button-rounded">
          <span class="material-symbols-outlined"> chevron_right </span>
        </div>
      </div>

      <!-- List start -->
      <div
        class="card"
        course-cate="{{subDescription}}"
        repeat="article|size:20|sort:postTime:desc|param:categories.id:62384618-4e7c-0008-18e0-db03370b979d|includes:"
      >
        <div class="top">
          <img src="https://static.izzi.asia{{images.path}}" alt="{{name}}" />
          <!-- <div class="tag">{{categories[1].subDescription}}</div> -->
        </div>

        <div class="bottom">
          <a
            href="/{{languageCode}}/bai-viet/{{friendlyUrl}}"
            class="goto-button"
          >
            <h4 class="lineclamp-keep-height-2">{{name}}</h4>
          </a>
          <div class="d-row-v-center gap-xxxs">
            <span class="material-symbols-outlined"> schedule </span>
            <p class="lineclamp-keep-height-1">
              {{createdDate|formatdatetime:dd-mm-yyyy}}
            </p>
          </div>
          <div class="description lineclamp-keep-height-3">{{description}}</div>
          <a
            class="goto-button"
            binding-btntext="Xem chi tiết"
            href="/{{languageCode}}/bai-viet/{{friendlyUrl}}"
          >
            Xem chi tiết
          </a>
        </div>
      </div>

      <!-- List end -->
    </div>

    <!-- ================= View all button ================= -->

    <div class="view-all-btn">
      <a
        class="button-secondary button-medium"
        href="pages/danh-sach-bai-viet"
        binding-btntext="        Xem thêm    "
        binding-btnhref=""
      >
        Xem thêm
      </a>
    </div>
  </section>
</div>
