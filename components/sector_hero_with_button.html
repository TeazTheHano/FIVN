<div>
  <style>
    #hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      align-items: end;
      overflow: hidden;
      background: var(--color-dark-contrast);
    }

    #hero #slide1:checked ~ .bg-slides .bg-slide:nth-child(1),
    #hero #slide2:checked ~ .bg-slides .bg-slide:nth-child(2),
    #hero #slide3:checked ~ .bg-slides .bg-slide:nth-child(3) {
      opacity: 1;
    }

    #hero .bg-slides {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    #hero .bg-slides .bg-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--transition-slow);
      transform: scale(1.05);
    }

    #hero .bg-slides .bg-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Overlays - Carbon & Gradient */
    #hero .bg-slides .overlay-carbon {
      position: absolute;
      inset: 0;
      background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
      opacity: 0.2;
      mix-blend-mode: overlay;
    }

    #hero .bg-slides .overlay-gradient {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          to right,
          rgba(0, 0, 0, 0.95),
          rgba(0, 0, 0, 0.7),
          transparent
        ),
        linear-gradient(
          to top,
          rgba(0, 0, 0, 0.8),
          transparent,
          rgba(0, 0, 0, 0.5)
        );
    }

    #hero .circuit-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0.6;
    }

    #hero .main-content {
      display: flex;
      flex: 1;
      justify-content: space-between;
      align-items: end;
      margin: var(--spacing-xxl);
    }

    #hero .content-container {
      padding: 0 var(--spacing-m);
      display: grid;
      grid-template-columns: 1fr;
    }

    #hero .content-container .hero-content {
      grid-area: 1 / 1;
      opacity: 0;
      transform: translateY(30px);
      visibility: hidden;
      transition: all 0.7s ease-out;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-m);
      justify-content: end;
    }

    #hero .content-container .hero-content .system-tag {
      font-family: var(--font-mono);
      color: var(--color-primary);
      font-size: var(--t-mini-size);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      gap: var(--spacing-xs);

      display: flex;
      flex-direction: row;
      align-items: center;
    }

    #hero .content-container .hero-content .system-tag .dot {
      width: 8px;
      height: 8px;
      background: var(--color-primary);
      border-radius: 50%;
      display: inline-block;
    }

    #hero .content-container .hero-content .system-tag::after {
      content: "";
      display: inline-block;
      width: 3rem;
      height: 0.5px;
      background-color: var(--color-primary);
      transform: translateY(-50%);
      vertical-align: middle;
    }

    #hero .content-container .hero-content h1 {
      line-height: 1.1;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      color: var(--color-white);
    }

    #hero .content-container .hero-content .description {
      border-left: 4px solid var(--color-primary);
      padding-left: 24px;
      color: var(--color-gray-400);
    }

    #hero .content-container .hero-content .btn-group {
      display: flex;
      gap: 20px;
      color: var(--color-white);
    }

    #hero .content-container .hero-content .btn-group a {
      text-decoration: none;
      /* border-radius: 0;
      color: var(--color-white);
      text-transform: uppercase;
      font-weight: var(--weight-semibold);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: var(--spacing-xxs);
      padding: var(--spacing-xs) var(--spacing-m); */
    }

    #hero .content-container .hero-content .btn-group p {
      font-size: inherit;
      color: inherit;
      font-weight: inherit;
    }

    #hero .content-container .hero-content .btn-group .btn-group-primary {
      clip-path: polygon(0 0, 100% 0, 100% 70%, 90% 100%, 0 100%);
      background-color: var(--color-secondary);
      border: none;

      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 16;
      }
    }

    #hero .content-container .hero-content .btn-group .btn-group-primary:hover {
      background-color: var(--color-white);
      color: var(--color-primary);
    }

    #hero .content-container .hero-content .btn-group .btn-group-secondary {
      background-color: transparent;
      border: 1px solid var(--color-white);

      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 1,
          "wght" 400,
          "GRAD" 0,
          "opsz" 16;
      }
    }

    #hero
      .content-container
      .hero-content
      .btn-group
      .btn-group-secondary:hover {
      color: var(--color-secondary);
      border-color: var(--color-secondary);
    }

    #hero .side-nav {
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 30;
    }

    #hero .side-nav .nav-item {
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      opacity: 0.4;
      transition: 0.3s;
    }

    #hero .side-nav .nav-item span {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--color-gray-400);
    }

    #hero .side-nav .nav-item .line {
      width: 48px;
      height: 2px;
      background: var(--color-gray-400);
      position: relative;
    }

    #hero .side-nav .nav-item .line::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0;
      background: var(--color-primary);
      transition: 0.3s;
    }

    #hero .side-nav .nav-item:hover {
      opacity: 0.7;
    }

    #hero #slide1:checked ~ .main-content .content-container #content1,
    #hero #slide2:checked ~ .main-content .content-container #content2,
    #hero #slide3:checked ~ .main-content .content-container #content3 {
      opacity: 1;
      transform: translateY(0);
      visibility: visible;
    }

    /* --- Navigation Control Logic --- */
    #hero #slide1:checked ~ .main-content .side-nav label[for="slide1"],
    #hero #slide2:checked ~ .main-content .side-nav label[for="slide2"],
    #hero #slide3:checked ~ .main-content .side-nav label[for="slide3"] {
      opacity: 1;
    }

    /* --- Navigation Control Animation --- */
    #hero
      #slide1:checked
      ~ .main-content
      .side-nav
      label[for="slide1"]
      .line::after,
    #hero
      #slide2:checked
      ~ .main-content
      .side-nav
      label[for="slide2"]
      .line::after,
    #hero
      #slide3:checked
      ~ .main-content
      .side-nav
      label[for="slide3"]
      .line::after {
      width: 100%;
    }

    #hero .bottom-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      z-index: 40;
    }
    #hero .bottom-progress .progress-fill {
      height: 100%;
      background: var(--color-primary);
      width: 0%;
    }

    /* Simple auto-animation for bar (visual only) */
    @keyframes progress {
      from {
        width: 0;
      }

      to {
        width: 100%;
      }
    }

    #hero .bottom-progress .animate-bar {
      animation: progress 5s linear infinite;
    }

    #hero .tech-coords {
      display: none !important;

      position: absolute;
      bottom: 30px;
      right: 40px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      text-align: right;
      z-index: 40;
    }
  </style>

  <section class="hero-section mouse-parallax" id="hero">
    <!-- 1. Slider Backgrounds -->
    <div class="bg-slides">
      <div class="bg-slide">
        <img
          binding-imgpath="https://images.unsplash.com/photo-1519389950473-47ba0277781c"
          src="https://images.unsplash.com/photo-1519389950473-47ba0277781c"
          alt="Tech 1"
        />
        <div class="overlay-carbon"></div>
        <div class="overlay-gradient"></div>
      </div>
      <div class="bg-slide">
        <img
          binding-imgpath="https://images.unsplash.com/photo-1518770660439-4636190af475"
          src="https://images.unsplash.com/photo-1518770660439-4636190af475"
          alt="Tech 2"
        />
        <div class="overlay-carbon"></div>
        <div class="overlay-gradient"></div>
      </div>
      <div class="bg-slide">
        <img
          binding-imgpath="https://images.unsplash.com/photo-1504384308090-c894fdcc538d"
          src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d"
          alt="Tech 3"
        />
        <div class="overlay-carbon"></div>
        <div class="overlay-gradient"></div>
      </div>
    </div>

    <!-- 2. Spotlight -->
    <div class="spotlight"></div>

    <!-- 3. Circuit Overlay (SVG) -->

    <!-- 4. Content Container -->
    <div class="d-row main-content">
      <div class="content-container">
        <div
          class="hero-content"
          id="content1"
          repeat="product|size:20|param:type:32|param:categories.id:622e7baa-e0b9-2da6-25d6-260e37769e34|includes:"
        >
          <div class="system-tag">
            <div class="dot"></div>
            <span>{{metaName}}</span>
          </div>
          <h1 class="p-ref-h2" binding-name="XÂY DỰNG TƯƠNG LAI SỐ">
            XÂY DỰNG TƯƠNG LAI SỐ
          </h1>
          <p
            class="description"
            binding-subdescription="Kết nối với mạng lưới khởi nghiệp lớn nhất thế giới.        "
          >
            Kết nối với mạng lưới khởi nghiệp lớn nhất thế giới.
          </p>
          <div class="btn-group mobileFlexColumn">
            <a
              class="button-medium button-primary"
              binding-btntext="ĐĂNG KÝ NEWSLETTER"
              href="#Contact"
              binding-btnhref="#Contact"
            >
              ĐĂNG KÝ NEWSLETTER
            </a>
            <a
              class="button-medium button-secondary"
              href="#Programme"
              binding-btnhref="#Programme"
              binding-btntext="CHƯƠNG TRÌNH FI CORE"
              >CHƯƠNG TRÌNH FI CORE
            </a>
          </div>
        </div>
      </div>

      <!-- 5. Navigation Side -->
      <div class="side-nav mobileHide">
        <label for="slide1" class="nav-item">
          <span>01</span>
          <div class="line"></div>
          <input hidden type="radio" name="hero" id="slide1" />
        </label>
      </div>
    </div>

    <!-- 6. Coords & Progress -->
    <div class="tech-coords">
      <div>COORDS: 10.7626° N, 106.6602° E</div>
      <div>STATUS: OPERATIONAL</div>
      <div class="tech-coords-value"></div>
    </div>
    <div class="bottom-progress">
      <div class="progress-fill animate-bar"></div>
    </div>
  </section>
</div>
