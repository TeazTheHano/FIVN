<div>
  <style>
    header,
    #header_placeholder,
    div[scrolled] {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
    }

    /* ===== Base ===== */

    div[scrolled] {
      justify-content: space-between;

      width: 100dvw;
      padding: 0 var(--spacing-m);

      color: var(--color-white);
      transition: var(--transition-base);
    }

    /* nav + nav > div */

    nav {
      /* width: 100%; */
      /* max-width: calc(100% - var(--spacing-xxl) * 2); */
      max-width: 1300px;
      margin: auto;
    }

    div[scrolled] nav,
    div[scrolled] nav > div {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: var(--spacing-m);
    }

    /* links */

    div[scrolled] a {
      text-decoration: none;
      color: currentColor;
      padding: var(--spacing-m) 0;
    }

    /* logo */

    div[scrolled] #logo {
      /* flex: 1; */
      margin-left: 0;
    }

    div[scrolled] #logo img {
      height: var(--spacing-xxl);
      width: auto;
    }

    div[scrolled] #logo img:last-child {
      display: none;
    }

    div[scrolled] #logo a {
      padding: 0;
    }

    /* hamburger icon */

    div[scrolled] #hamburger-menu-icon {
      position: relative;
      z-index: 1;
      display: none;
    }

    div[scrolled] #hamburger-menu-icon span {
      color: currentColor;
    }

    /* ===== TOGGLE (GIỮ NGUYÊN QUAN HỆ SIBLING) ===== */

    div[scrolled] #menu-toggle:checked ~ label .hamburger-open {
      display: none;
    }

    div[scrolled] #menu-toggle:checked ~ label .hamburger-close {
      display: block;
      color: var(--color-black);
    }

    div[scrolled] #menu-toggle:not(:checked) ~ label .hamburger-close {
      display: none;
    }

    /* ===== MENU OPEN ===== */

    div[scrolled] #menu-toggle:checked ~ #hamburger-menu {
      width: 100dvw;
      height: 100dvh;

      display: flex !important;
      flex-direction: column;
      gap: var(--spacing-m);

      position: fixed;
      top: 0;
      left: 0;

      background-color: rgba(255, 255, 255, 0.8);
      color: var(--color-black);
      backdrop-filter: blur(10px);
      justify-content: center;
    }

    /* ===== SCROLLED STATE ===== */

    .scrolled div[scrolled] {
      background-color: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow-m);
      backdrop-filter: blur(10px);
      color: var(--color-black);
    }

    .scrolled div[scrolled] nav {
      max-width: 1300px;
      margin: auto;
    }

    .scrolled div[scrolled] a {
      padding: var(--spacing-s) 0;
    }

    .scrolled div[scrolled] span,
    .scrolled div[scrolled] a,
    .scrolled div[scrolled] #hamburger-menu-icon {
      color: var(--color-black);
    }

    .scrolled div[scrolled] #logo a {
      color: var(--color-secondary);
      padding: var(--spacing-xxxs) 0;
    }

    .scrolled div[scrolled] #logo img:first-child {
      display: none;
    }

    .scrolled div[scrolled] #logo img:last-child {
      display: block;
    }

    .headerForm {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-m);
      justify-content: center;
      align-items: center;
    }

    .headerForm > div {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--spacing-s);
      align-items: center;
    }

    .headerForm input {
      color: var(--color-black);
      font-family: var(--font-main);
      padding: var(--spacing-xs);
      border-radius: var(--radius-s);
      border: 1px solid var(--color-gray-400);
      background-color: var(--color-white);
    }

    .headerForm label.error {
      color: red;
      font-size: var(--t-mini-size);
      line-height: var(--t-mini-lh);
    }

    #user-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xxs);
      background-color: var(--color-white);
      border-radius: var(--radius-s);
      box-shadow: var(--shadow-m);
      padding: var(--spacing-xs);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-6px);
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
      z-index: 100;
    }

    #AfterLogin:hover #user-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    #user-dropdown .user-menu-item {
      display: flex !important;
      width: 100%;
    }
  </style>

    </style>

  <!-- Auth Modal -->
  <dialog id="authModal" class="modal-dialog">
    <div class="modal-content d-column gap-m">
      <div class="d-row-h-between d-row-v-center">
        <h3 binding-name="Log in">Log in</h3>
        <button
          class="modal-close button-secondary button-rounded"
          onclick="authModal.close()"
          aria-label="Đóng"
        >
          <span class="material-symbols-outlined"> close </span>
        </button>
      </div>
      <div class="login-section">
        <form
          class="headerForm"
          id="formLogin"
          action="javascript:void(0)"
          method="post"
        >
          <div>
            <label for="loginEmail" binding-name="Email">Email</label>
            <input
              type="text"
              name="name"
              placeholder="example@email.com"
              required
              id="loginEmail"
            />

            <label for="loginPassword" binding-name="Password">Password</label>
            <input
              name="password"
              type="password"
              id="loginPassword"
              placeholder="••••••••"
              required
            />
          </div>

          <button
            binding-btntext="            Login          "
            type="submit"
            class="button-primary button-large"
            id="submitLogin"
          >
            Login
          </button>

          <a href="#" id="btnForgotPassword" class="forgot-link"
            >Quên mật khẩu?</a
          >

          <span>
            <span class="p-subbody"> Nếu chưa có tài khoản, vui lòng</span>
            <a
              onclick="
                authModal.close();
                signinModal.showModal();
              "
              binding-btntext="              Đăng ký            "
            >
              Đăng ký
            </a>
          </span>
        </form>
      </div>
    </div>
  </dialog>

  <!-- Signin Modal -->
  <dialog id="signinModal" class="modal-dialog">
    <div class="modal-content d-column gap-m">
      <div class="d-row-h-between d-row-v-center">
        <h3 binding-name="Sign up">Sign up</h3>
        <button
          class="modal-close button-secondary button-rounded"
          onclick="signinModal.close()"
          aria-label="Đóng"
        >
          <span class="material-symbols-outlined"> close </span>
        </button>
      </div>

      <div class="login-section">
        <!-- Message -->
        <div style="width: inherit; white-space: wrap">
          <h4
            style="width: inherit; white-space: wrap"
            class="errorMessage"
          ></h4>
          <h4
            style="width: inherit; white-space: wrap"
            class="returnMessage mt-3"
          ></h4>
        </div>
        <!-- Form -->
        <form
          class="customForm headerForm"
          id="81a61e28-0c2b-ae4d-ac2c-1d121b17ded2"
          action="javascript:void(0)"
          method="post"
          data-check-email="true"
          data-check-mobile="true"
          novalidate="novalidate"
        >
          <div>
            <label for="name" binding-name="Họ và tên"
              >Họ và tên <sup style="color: red">*</sup></label
            >
            <div class="d-column gap-xs">
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Nhập họ và tên của bạn"
                required
                oninvalid="this.setCustomValidity('Đây là trường bắt buộc')"
                oninput="this.setCustomValidity('')"
              />
            </div>

            <label for="phone" binding-name="Số điện thoại"
              >Số điện thoại <sup style="color: red">*</sup></label
            >
            <div class="d-column gap-xs">
              <input
                type="tel"
                id="phone"
                name="mobile"
                placeholder="Nhập số điện thoại của bạn"
                required
                oninvalid="this.setCustomValidity('Đây là trường bắt buộc')"
                oninput="this.setCustomValidity('')"
              />
            </div>

            <label for="email" binding-name="Email"
              >Email <sup style="color: red">*</sup></label
            >
            <div class="d-column gap-xs">
              <input
                type="email"
                id="email"
                name="email"
                placeholder="example@email.com"
                required
                oninvalid="this.setCustomValidity('Đây là trường bắt buộc')"
                oninput="this.setCustomValidity('')"
              />
            </div>

            <label for="officePosition" binding-name="Chức danh"
              >Chức danh <sup style="color: red">*</sup></label
            >
            <div class="d-column gap-xs">
              <input
                type="text"
                class="form-control valid"
                name="officePosition"
                attribute_checkbox="attribute_checkbox"
                attribute_type="3"
                attribute_id="c918f3e3-ff7b-3129-bab8-b48f84088f2d"
                id="officePosition"
                required="required"
                aria-required="true"
                placeholder="CEO, Founder, Staff,..."
                oninvalid="this.setCustomValidity('Đây là trường bắt buộc')"
                oninput="this.setCustomValidity('')"
              />
            </div>

            <label for="officeName" binding-name="Tên văn phòng"
              >Tên công ty <sup style="color: red">*</sup></label
            >
            <div class="d-column gap-xs">
              <input
                type="text"
                class="form-control valid"
                name="officeName"
                attribute_checkbox="attribute_checkbox"
                attribute_type="3"
                attribute_id="b8eb122b-103e-3458-59ce-eac1ac3f13fa"
                id="officeName"
                required="required"
                aria-required="true"
                placeholder="Nhập tên công ty của bạn"
                oninvalid="this.setCustomValidity('Đây là trường bắt buộc')"
                oninput="this.setCustomValidity('')"
              />
            </div>

            <label for="linkedinLink" binding-name="Địa chỉ LinkedIn"
              >Địa chỉ LinkedIn</label
            >
            <div class="d-column gap-xs">
              <input
                type="text"
                class="form-control"
                name="linkedinLink"
                attribute_checkbox="attribute_checkbox"
                attribute_type="3"
                attribute_id="e05cbc41-b5fc-8e52-620e-d86fd8495cee"
                id="linkedinLink"
                placeholder="https://www.linkedin.com/in/your-profile"
              />
            </div>
          </div>

          <button
            binding-btntext="            Sign up          "
            type="submit"
            class="button-primary button-large btn-register-submit"
            id="button-service-submit"
            access="false"
          >
            Sign up
          </button>

          <span>
            <span
              class="p-subbody"
              binding-name="              Nếu đã có tài khoản, vui lòng"
            >
              Nếu đã có tài khoản, vui lòng</span
            >
            <a
              onclick="
                signinModal.close();
                authModal.showModal();
              "
              binding-btntext="              Login            "
            >
              Login
            </a>
          </span>
        </form>
      </div>
    </div>
  </dialog>

  <dialog id="changePasswordModal" class="modal-dialog">
    <div class="modal-content d-column gap-m">
      <div class="d-row-h-between d-row-v-center">
        <h3 binding-name="Change Password">Change Password</h3>
        <button
          class="modal-close button-secondary button-rounded"
          onclick="changePasswordModal.close()"
          aria-label="Đóng"
        >
          <span class="material-symbols-outlined"> close </span>
        </button>
      </div>

      <div class="login-section">
        <!-- Message -->
        <div style="width: inherit; white-space: wrap">
          <h4
            style="width: inherit; white-space: wrap"
            class="errorMessage"
          ></h4>
          <h4
            style="width: inherit; white-space: wrap"
            class="returnMessage mt-3"
          ></h4>
        </div>
        <!-- Form -->
        <form
          class="headerForm"
          id="formChangePassword"
          action="javascript:void(0)"
          method="post"
          data-check-email="false"
          data-check-mobile="false"
          novalidate="novalidate"
        >
          <div class="form-error" style="display:none; color:red; font-size:var(--t-mini-size);"></div>

          <div class="d-column gap-l">
            <label for="oldPassword" binding-name="Old Password"
              >Mật khẩu cũ <sup style="color: red">*</sup></label
            >
            <div class="d-column gap-xs">
              <input
                type="password"
                name="oldPassword"
                id="oldPassword"
                placeholder="Nhập mật khẩu cũ"
                required="required"
                aria-required="true"
                autocomplete="current-password"
                oninvalid="this.setCustomValidity('Đây là trường bắt buộc')"
                oninput="this.setCustomValidity('')"
              />
            </div>

            <label for="newPassword" binding-name="New Password"
              >Mật khẩu mới <sup style="color: red">*</sup></label
            >
            <div class="d-column gap-xs">
              <input
                type="password"
                name="newPassword"
                id="newPassword"
                placeholder="Nhập mật khẩu mới"
                required="required"
                aria-required="true"
                oninvalid="this.setCustomValidity('Đây là trường bắt buộc')"
                oninput="this.setCustomValidity('')"
              />
            </div>

            <label for="confirmPassword" binding-name="Confirm New Password"
              >Xác nhận mật khẩu mới <sup style="color: red">*</sup></label
            >
            <div class="d-column gap-xs">
              <input
                type="password"
                name="confirmPassword"
                id="confirmPassword"
                placeholder="Nhập lại mật khẩu mới"
                required="required"
                aria-required="true"
                oninvalid="this.setCustomValidity('Đây là trường bắt buộc')"
                oninput="this.setCustomValidity('')"
              />
            </div>
          </div>

          <button
            binding-btntext="            Change Password          "
            type="submit"
            class="button-primary button-large"
          >
            Change Password
          </button>

          <span>
            <span
              class="p-subbody"
              binding-name="              Quay lại trang đăng nhập"
            >
              Quay lại trang đăng nhập</span
            >
            <a
              onclick="
                changePasswordModal.close();
                authModal.showModal();
              "
              binding-btntext="            Login            "
            >
              Login
            </a>
          </span>
        </form>
      </div>
    </div>
  </dialog>
</div>
