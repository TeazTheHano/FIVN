<div>
  <style>
    header,
    #header_placeholder,
    div[scrolled] {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
    }

    /* ===== Base ===== */

    div[scrolled] {
      justify-content: space-between;

      width: 100dvw;
      padding: 0 var(--spacing-m);

      color: var(--color-white);
      transition: var(--transition-base);
    }

    /* nav + nav > div */

    nav {
      /* width: 100%; */
      /* max-width: calc(100% - var(--spacing-xxl) * 2); */
      max-width: 1300px;
      margin: auto;
    }

    div[scrolled] nav,
    div[scrolled] nav > div {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: var(--spacing-m);
    }

    /* links */

    div[scrolled] a {
      text-decoration: none;
      color: currentColor;
      padding: var(--spacing-m) 0;
    }

    /* logo */

    div[scrolled] #logo {
      /* flex: 1; */
      margin-left: 0;
    }

    div[scrolled] #logo img {
      height: var(--spacing-xxl);
      width: auto;
    }

    div[scrolled] #logo img:last-child {
      display: none;
    }

    div[scrolled] #logo a {
      padding: 0;
    }

    /* hamburger icon */

    div[scrolled] #hamburger-menu-icon {
      position: relative;
      z-index: 1;
      display: none;
    }

    div[scrolled] #hamburger-menu-icon span {
      color: currentColor;
    }

    /* ===== TOGGLE (GIỮ NGUYÊN QUAN HỆ SIBLING) ===== */

    div[scrolled] #menu-toggle:checked ~ label .hamburger-open {
      display: none;
    }

    div[scrolled] #menu-toggle:checked ~ label .hamburger-close {
      display: block;
      color: var(--color-black);
    }

    div[scrolled] #menu-toggle:not(:checked) ~ label .hamburger-close {
      display: none;
    }

    /* ===== MENU OPEN ===== */

    div[scrolled] #menu-toggle:checked ~ #hamburger-menu {
      width: 100dvw;
      height: 100dvh;

      display: flex !important;
      flex-direction: column;
      gap: var(--spacing-m);

      position: fixed;
      top: 0;
      left: 0;

      background-color: rgba(255, 255, 255, 0.8);
      color: var(--color-black);
      backdrop-filter: blur(10px);
      justify-content: center;
    }

    /* ===== SCROLLED STATE ===== */

    .scrolled div[scrolled] {
      background-color: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow-m);
      backdrop-filter: blur(10px);
      color: var(--color-black);
    }

    .scrolled div[scrolled] nav {
      max-width: 1300px;
      margin: auto;
    }

    .scrolled div[scrolled] a {
      padding: var(--spacing-s) 0;
    }

    .scrolled div[scrolled] span,
    .scrolled div[scrolled] a,
    .scrolled div[scrolled] #hamburger-menu-icon {
      color: var(--color-black);
    }

    .scrolled div[scrolled] #logo a {
      color: var(--color-secondary);
      padding: var(--spacing-xxxs) 0;
    }

    .scrolled div[scrolled] #logo img:first-child {
      display: none;
    }

    .scrolled div[scrolled] #logo img:last-child {
      display: block;
    }

    .headerForm {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-m);
      justify-content: center;
      align-items: center;
    }

    .headerForm > div {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--spacing-s);
      align-items: center;
    }

    .headerForm input {
      color: var(--color-black);
      font-family: var(--font-main);
      padding: var(--spacing-xs);
      border-radius: var(--radius-s);
      border: 1px solid var(--color-gray-400);
      background-color: var(--color-white);
    }

    #AfterLogin:hover #logoutFb {
      display: block;
      position: absolute;
      width: 100%;
    }

    #AfterLogin:hover #UserSlot {
      visibility: hidden;
    }
  </style>

  <div scrolled="" class="d-row-v-center">
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined");
      @import url("https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");
    </style>
    <nav>
      <div id="logo">
        <a href="/" binding-btnhref="/">
          <img
            binding-imgpath="https://static.izzi.asia/images/2026/3/13/2603130611_FIVlogowhite.png"
            src="https://static.izzi.asia/images/2026/3/13/2603130611_FIVlogowhite.png"
            alt=""
          />
          <img
            binding-imgpath="https://static.izzi.asia/images/2026/3/13/2603137540_FIVlogoblack.png"
            src="https://static.izzi.asia/images/2026/3/13/2603137540_FIVlogoblack.png"
            alt=""
          />
        </a>
      </div>

      <input type="checkbox" id="menu-toggle" hidden="" />
      <label for="menu-toggle" id="hamburger-menu-icon" class="mobileShow">
        <div class="hamburger-open">
          <span class="material-symbols-outlined"> menu </span>
        </div>
        <div class="hamburger-close">
          <span class="material-symbols-outlined"> close </span>
        </div>
      </label>

      <div id="hamburger-menu" class="mobileHide">
        <a
          binding-name="About us"
          class="button"
          href="/pages/ve-chung-toi"
          binding-btnhref="#AboutUs"
          >About us</a
        >
        <a
          binding-name="Event"
          class="button"
          href="/pages/su-kien"
          binding-btnhref="#Programme"
          >Event</a
        >
        <a
          binding-name="Mentor  "
          class="button"
          href="/pages/mang-luoi"
          binding-btnhref="#Event"
          >Mentor
        </a>
        <a
          binding-name="Program"
          class="button"
          href="/pages/danh-sach-khoa-hoc"
          binding-btnhref="#Network"
          >Program</a
        >
        <a
          binding-name="Blog"
          class="button"
          href="/pages/danh-sach-bai-viet"
          binding-btnhref="#Course"
          >Blog</a
        >
        <a
          binding-name="Partner"
          class="button"
          href="/pages/doi-tac"
          binding-btnhref="#Partner"
          >Partner</a
        >
        <a
          binding-name="Contact        "
          class="button"
          href="/pages/lien-he"
          binding-btnhref="#Contact"
          >Contact
        </a>
        <div></div>
        <button
          class="button-secondary button-small userNotLogin"
          binding-name="          Login        "
          id="openAuthModal"
          onclick="authModal.showModal()"
        >
          Login
        </button>
        <div
          class="btn-user-logged userLogin d-none"
          aria-label="User Profile"
          id="AfterLogin"
        >
          <div class="relative d-column gap-xs">
            <div
              class="d-row-v-center button-primary-2 button-small gap-xxs"
              id="UserSlot"
            >
              <span class="user-logged-text displayName"></span>
              <span class="material-symbols-outlined"> stat_minus_1 </span>
            </div>

            <!-- <div id="LogoutButton" class="d-none button-primary-2 button-small"> -->
            <button
              href="javascript:void(0);"
              class="user-menu-item logoutFb d-none button-primary-2 button-small"
              id="logoutFb"
            >
              <div class="d-center gap-xxs">
                <span binding-name="Logout">Logout</span>
                <span class="material-symbols-outlined"> logout </span>
              </div>
            </button>
            <!-- </div> -->
          </div>
        </div>
      </div>
    </nav>
  </div>

  <!-- Auth Modal -->
  <dialog id="authModal" class="modal-dialog">
    <div class="modal-content d-column gap-m">
      <div class="d-row-h-between d-row-v-center">
        <h3 binding-name="Log in">Log in</h3>
        <button
          class="modal-close button-secondary button-rounded"
          onclick="authModal.close()"
          aria-label="Đóng"
        >
          <span class="material-symbols-outlined"> close </span>
        </button>
      </div>
      <div class="login-section">
        <form
          class="headerForm"
          id="formLogin"
          action="javascript:void(0)"
          method="post"
        >
          <div>
            <label for="loginEmail" binding-name="Email">Email</label>
            <input
              type="text"
              name="name"
              placeholder="example@email.com"
              required=""
              id="loginEmail"
            />

            <label for="loginPassword" binding-name="Password">Password</label>
            <input
              name="password"
              type="password"
              id="loginPassword"
              placeholder="••••••••"
              required=""
            />
          </div>

          <button
            binding-btntext="Login"
            type="submit"
            class="button-primary button-large"
            id="submitLogin"
          >
            Login
          </button>

          <span>
            <span class="p-subbody"> Nếu chưa có tài khoản, vui lòng</span>
            <a
              onclick="
                authModal.close();
                signinModal.showModal();
              "
              binding-btntext="Đăng ký"
            >
              Đăng ký
            </a>
          </span>
        </form>
      </div>
    </div>
  </dialog>

  <!-- Signin Modal -->
  <dialog id="signinModal" class="modal-dialog">
    <div class="modal-content d-column gap-m">
      <div class="d-row-h-between d-row-v-center">
        <h3 binding-name="Sign in">Sign in</h3>
        <button
          class="modal-close button-secondary button-rounded"
          onclick="signinModal.close()"
          aria-label="Đóng"
        >
          <span class="material-symbols-outlined"> close </span>
        </button>
      </div>

      <div class="login-section">
        <!-- Message -->
        <div style="width: inherit; white-space: wrap">
          <h4
            style="width: inherit; white-space: wrap"
            class="duplicateMessage"
          ></h4>
          <h4
            style="width: inherit; white-space: wrap"
            class="returnMessage mt-3"
          ></h4>
        </div>
        <!-- Form -->
        <form
          class="customForm headerForm"
          id="81a61e28-0c2b-ae4d-ac2c-1d121b17ded2"
          action="javascript:void(0)"
          method="post"
          data-check-email="true"
          data-check-mobile="true"
        >
          <div>
            <label for="fullName" binding-name="Họ và tên">Họ và tên</label>
            <input
              type="text"
              id="fullName"
              name="name"
              placeholder="Nhập họ và tên của bạn"
              required
            />

            <label for="phone" binding-name="Số điện thoại"
              >Số điện thoại</label
            >
            <input
              type="tel"
              id="phone"
              name="mobile"
              placeholder="0909090909"
              required
            />

            <label for="email" binding-name="Email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="example@email.com"
              required
            />
          </div>

          <button
            binding-btntext="Sign in"
            type="submit"
            class="button-primary button-large btn-register-submit"
            id="button-service-submit"
            access="false"
          >
            Sign in
          </button>

          <span>
            <span
              class="p-subbody"
              binding-name="Nếu đã có tài khoản, vui lòng"
            >
              Nếu đã có tài khoản, vui lòng</span
            >
            <a
              onclick="
                signinModal.close();
                authModal.showModal();
              "
              binding-btntext="Login"
            >
              Login
            </a>
          </span>
        </form>
      </div>
    </div>
  </dialog>
</div>
