<div>
  <style>
  /* ================= EVENT ================= */

  #Event #Event_content {
    gap: var(--spacing-xxs);
  }

  /* ---------- CARDS ---------- */

  #Event #Event_content_cards {
    width: 100%;
    max-width: 1240px;
  }

  #Event .card:nth-child(2n + 1) {
    direction: rtl;
  }

  #Event .card {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 5vw;
  }

  /* mark */

  #Event .card .event_content_cards_mark {
    font-weight: var(--weight-bold);
    font-size: var(--spacing-xxxl);
    text-transform: uppercase;
    align-self: center;
    justify-self: center;
    opacity: 0.1;
    flex: 1;
    pointer-events: none;
    user-select: none;
  }

  /* ---------- TIMELINE ---------- */

  #Event .card .rounded {
    height: inherit;
    position: relative;
  }

  #Event .card .rounded .rounded-dot {
    position: absolute;
    z-index: 1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    aspect-ratio: 1;
    width: var(--spacing-s);
    height: var(--spacing-s);

    background-color: var(--color-gray-400);
    border-radius: var(--radius-round);
    border: 2px solid rgba(255, 255, 255, 0.2);

    outline: 0 solid var(--color-primary);
    outline-offset: calc(-1 * var(--spacing-xs) / 2);
  }

  #Event .card .rounded .rounded-line {
    width: 2px;
    height: 100%;
    background-color: var(--color-gray-400);
    overflow: hidden;
  }

  #Event .card .rounded .rounded-line > div {
    width: 100%;
    height: 0%;
    background-color: var(--color-primary);
    animation: progressV 3s ease-in-out infinite;
  }

  /* ---------- CARD ITEM ---------- */

  #Event .card .card-item {
    direction: ltr;
    overflow: hidden;

    border-radius: var(--radius-l);
    margin-bottom: var(--spacing-l);

    filter: drop-shadow(var(--shadow-l));
  }

  /* top */

  #Event .card .card-item .top {
    width: 100%;
    aspect-ratio: 16 / 9;
    
    padding: var(--spacing-s);

    display: flex;
    flex-direction: column;
    justify-content: flex-end;

    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0.6) 100%
    );
  }

  #Event .card .card-item .bottom h4 {
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  #Event .card .card-item .top img {
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    object-fit: cover;
    z-index: -1;
  }

  #Event .card .card-item .top div[state] {
    top: var(--spacing-s);
    right: var(--spacing-s);
    z-index: 1;
    font-size: var(--t-mini-size);
  }

  /* ---------- STATE ---------- */

  #Event .card .card-item .top div[state="ended"]::after {
    content: "Ended";
    background-color: var(--color-social-linkedin);
    padding: var(--spacing-xxxs) var(--spacing-xs);
    border-radius: var(--radius-round);
    color: var(--color-white);
  }

  #Event
    .card
    .card-item
    .top
    div[state="ongoing"]::after {
    content: "Ongoing";
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    color: #fff;
    animation: breatheState1 1.2s ease-in-out infinite alternate;
  }

  #Event
    .card
    .card-item
    .top
    div[state="upcoming"]::after {
    content: "Upcoming";
    background-color: var(--color-primary);
    padding: var(--spacing-xxxs) var(--spacing-xs);
    border-radius: var(--radius-round);
    color: var(--color-white);
  }

  #Event
    .card
    .card-item
    .top
    div[state="registration open"]::after {
    content: "Registration open";
    background-color: var(--color-secondary);
    padding: var(--spacing-xxxs) var(--spacing-xs);
    border-radius: var(--radius-round);
    color: var(--color-white);
  }

  #Event
    .card
    .card-item
    .top
    div[state="scheduled"]::after {
    content: "Scheduled";
    background-color: var(--color-secondary);
    padding: var(--spacing-xxxs) var(--spacing-xs);
    border-radius: var(--radius-round);
    color: var(--color-white);
  }

  /* ---------- BOTTOM ---------- */

  #Event .card .card-item .bottom {
    background-color: var(--color-white);
    padding: var(--spacing-m);

    display: flex;
    flex-direction: column;
    gap: var(--spacing-xs);
  }

  #Event .card .card-item .bottom p:not(.d-none) {
    font-size: var(--t-mini-size);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  #Event .card .card-item .bottom span {
    font-weight: var(--weight-regular);
    font-size: var(--t-mini-size) !important;
    color: var(--color-primary);
  }

  #Event .card .card-item .bottom .time {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-xs);
    align-items: flex-start ;
  }

  #Event .card .card-item .bottom .time div {
    display: flex;
    align-items: center;
    gap: var(--spacing-xxxs);
  }

  #Event .card .card-item .bottom .time div span {
    font-weight: var(--weight-regular);
    font-size: var(--t-mini-size) !important;
    color: var(--color-primary);
  }

  #Event .card .card-item .bottom .time div p {
    font-weight: var(--weight-semibold);
    text-transform: uppercase;
  }

  #Event .card .card-item .bottom div {
    display: flex;
    align-items: center;
    gap: var(--spacing-xxxs);
  }

  /* ---------- HOVER ---------- */

  #Event .card:hover .rounded .rounded-dot {
    background-color: var(--color-white);
    outline: calc(var(--spacing-xs) / 2) solid var(--color-primary);
    outline-offset: calc(-1 * var(--spacing-xs) / 2);
  }

  #Event .card:hover .rounded .rounded-line div {
    animation: none;
    height: 100%;
    transition: height 0.7s ease-out;
    background: linear-gradient(
      90deg,
      transparent 0%,
      var(--color-primary) 50%,
      transparent 100%
    );
  }

  #Event .card:hover .card-item {
    filter: drop-shadow(var(--shadow-xxl)) drop-shadow(var(--shadow-l));
  }

  /* ---------- BG ---------- */

  #Event .bg {
    z-index: -2;

    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
  }

  #Event .bg img {
    opacity: 0.4;
  }


  /* ---------- CATEGORY SELECTOR ---------- */

  #Event #Event_content #Event_content_cate_selector {
    max-width: 100%;
    width: fit-content;
    padding: var(--spacing-xxxs);
    margin-top: var(--spacing-xs);
    margin-bottom: var(--spacing-m);
    background-color: var(--color-gray-200);
    border-radius: var(--radius-round);
    border: 1px solid var(--color-gray-400);
    overflow-x: scroll;

  }

  /* Ẩn tất cả khi chọn 1 category cụ thể */
  #Event:has(input[value]:checked) .card[event-cate] {
    display: none;
  }

  /* Hiện đúng category */
  #Event:has(input[value="openning"]:checked) .card[event-cate="openning"],
  #Event:has(input[value="event"]:checked) .card[event-cate="event"],
  #Event:has(input[value="lunchup"]:checked) .card[event-cate="lunchup"],
  #Event:has(input[value="online"]:checked) .card[event-cate="online"],
  #Event:has(input[value="offline"]:checked) .card[event-cate="offline"] {
    display: grid;
  }

  /* ALL = hiện tất cả */
  #Event:has(input[value="all"]:checked) .card[event-cate] {
    display: grid;
  }
</style>

<section id="Event" class="relative">
  <div class="bg absolute">
    <img
      src="https://static.izzi.asia/templates/FIVN/svg/dot-pattern.svg"
      alt=""
    />
  </div>

  <div id="Event_content" class="d-column-h-center">

    <p class="tag" binding-name="Lịch trình">Lịch trình</p>
    <h2 binding-name="Sự kiện & Hoạt động">Sự kiện & Hoạt động</h2>

      <div class="d-row scrollbar-hide" id="Event_content_cate_selector">

      <label class="button-chip">
        <input type="radio" name="Event_content_cate" value="all" hidden checked>
        Tất cả
      </label>

      <label class="button-chip">
        <input type="radio" name="Event_content_cate" value="openning" hidden>
        Khai giảng
      </label>

      <label class="button-chip">
        <input type="radio" name="Event_content_cate" value="event" hidden>
        Sự kiện
      </label>

      <label class="button-chip">
        <input type="radio" name="Event_content_cate" value="lunchup" hidden>
        Lunchup
      </label>

      <label class="button-chip">
        <input type="radio" name="Event_content_cate" value="online" hidden>
        Online
      </label>

      <label class="button-chip">
        <input type="radio" name="Event_content_cate" value="offline" hidden>
        Offline
      </label>

    </div>

    <div id="Event_content_cards">
      <div
        class="card relative d-row gap-m"
        repeat="event|size:8|sort:startDateTime:desc|param:type:1|includes:"
        data-aos="fade-up"
        event-cate="{{metaName}}"
      >
        <div class="event_content_cards_mark"></div>
        <div class="rounded d-column-h-center">
          <div class="rounded-dot"></div>
          <div class="rounded-line">
            <div></div>
          </div>
        </div>

        <div binding-btnhref="" class="card-item">
          <div class="top relative">
            <!-- TODO: sync state with schedule -->
            <div class="tag absolute" state=""></div>
            <img
              class="absolute"
              src="https://static.izzi.asia/{{images.path}}"
              alt=""
            />
            <p class="tag">{{metaKeyword}}</p>
          </div>

            <div class="bottom">
              <h4>{{name}}</h4>
              <div class="time">
                <p class="d-none startDateTimeUtc">{{startDateTimeUtc}}</p>
                <p class="d-none endDateTimeUtc">{{endDateTimeUtc}}</p>
                <div>
                  <span class="material-symbols-outlined"> calendar_today </span>
                  <p class="card-date"></p>
                </div>
                <div>
                  <span class="material-symbols-outlined"> schedule </span>
                  <p class="card-time"></p>
                </div>
                <div>
                  <span class="material-symbols-outlined"> location_on </span>
                  <span repeat="address|param:id:parent.addressIds|includes:"><p>{{name}} {{detailAddress}}</p></span>
                </div>
              </div>

              <hr />
              <p>{{subDescription}}</p>
            
            </div>
          </div>
        </div>
      </div>

          <button
            binding-btnhref=""
            binding-btntext="Xem lịch trình đầy đủ"
            class="button-secondary button-medium"
          >
            Xem lịch trình đầy đủ
          </button>
        </div>
        </section>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</div>
