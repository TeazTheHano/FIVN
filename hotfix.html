          alt="Lunchup Logo"
          class="logo-image"
        />
      </a>
    </div>

    <!-- Search bar -->

            <button>

        </div> -->

    <!-- Actions -->
    <div class="header-actions">
      <!-- <button class="header-search-btn" aria-label="Search">
                <i class="fas fa-search"></i>
            </button> -->

      <button class="header-notification" aria-label="Notifications">
        <i class="far fa-bell"></i>
        <span class="notification-dot"></span>
      </button>
      <button
        usernotlogin
        class="btn-user-login userNotLogin show-login-section"
      >
        <div style="display: flex; align-items: center; gap: 5px">
          <div class="header-avatar">
            <span>
              <i class="fas fa-user" style="color: var(--color-white)"></i
            ></span>
          </div>
          <span class>Đăng Nhập</span>
        </div>
      </button>

      <!-- Button khi đã đăng nhập -->
      <button
        userlogin
        class="btn-user-logged userLogin"
        aria-label="User Profile"
      >
        <div style="display: flex; align-items: center; gap: 5px">
          <div class="header-avatar">
            <span>
              <span>
                <i class="fas fa-user" style="color: var(--color-white)"></i>
              </span>
            </span>
          </div>
          <span class="user-logged-text displayName">Bảo Bảo</span>
          <i class="fas fa-chevron-down"></i>
        </div>
      </button>
      <div class="user-menu-wrapper hidden" id="userMenuMobile">
        <div class="user-menu-dropdown">
          <div class="user-menu-title">
            Hội viên: <span id="userNameDesktop " class="displayName"></span>
          </div>
          <div class="user-menu-divider"></div>

                            <i class="fas fa-user-circle"></i>

                        </a> -->
          <a href="#" class="user-menu-item" id="logoutFb">
            <i class="fas fa-sign-out-alt"></i>
            <span>Đăng Xuất</span>
          </a>
        </div>
      </div>
    </div>
  </div>
  <div id="authModal" class="auth-modal hidden">
    <div class="auth-modal-overlay"></div>
    <div class="auth-modal-content">
      <button class="auth-modal-close" id="closeAuthModal" aria-label="Đóng">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>
      <div class="login-section">
        <div class="login-card">
          <div style="text-align: center">
            <h2 class="form-title">Đăng nhập</h2>
          </div>

          <form id="formLogin" action="javascript:void(0)" method="post">
            <div class="form-group">
              <label for="loginEmail"
                ><i class="fas fa-envelope"></i> Email</label
              >
              <input
                type="email"
                id="loginEmail"
                name="name"
                placeholder="example@email.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="loginPassword"
                ><i class="fas fa-key"></i> Mật khẩu</label
              >
              <input
                type="password"
                id="loginPassword"
                name="password"
                placeholder="••••••••"
                required
              />
            </div>

            <div class="checkbox-group">
              <div class="remember-me">
                <input type="checkbox" />
                <span>Ghi nhớ đăng nhập</span>
              </div>
              <a href="#" class="forgot-link">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn-login-mobile" id="submitLogin">
              Đăng nhập ngay
            </button>

            <p class="register-link">
              Chưa có tài khoản?
              <a href="#" class="toggle-to-register">Đăng ký ngay</a>
            </p>
          </form>
        </div>
      </div>
      <div class="register-section">
        <div class="register-card">
          <div style="text-align: center">
            <h2 class="form-title">Tạo tài khoản mới</h2>
          </div>

          <form
            class="customForm"
            id="1bb90723-f930-5f7c-a3b0-83dad61f39a2"
            action="javascript:void(0)"
            method="post"
            data-check-email="true"
            data-check-mobile="true"
          >
            <div class="form-row">
              <div class="form-group">
                <label for="fullName"
                  ><i class="fas fa-user"></i> Họ và tên</label
                >
                <input
                  type="text"
                  id="fullName"
                  name="name"
                  placeholder="Nguyễn Văn A"
                  required
                />
              </div>
              <div class="form-group">
                <label for="phone"
                  ><i class="fas fa-phone"></i> Số điện thoại</label
                >
                <input
                  type="tel"
                  id="phone"
                  name="mobile"
                  placeholder="0909090909"
                  required
                />
              </div>
            </div>
            <div class="form-group">
              <label for="email"
                ><i class="fas fa-envelope"></i> Linkedin</label
              >
              <input
                type="url"
                id="linkedin"
                name="linkedin"
                class="form-input"
                placeholder="linkedin.com/in/..."
                required
              />
            </div>
            <div class="form-group">
              <label for="email"
                ><i class="fas fa-envelope"></i> Facebook</label
              >
              <input
                type="url"
                id="facebook"
                name="facebook"
                placeholder="https://www.facebook.com/lunchup.asia"
              />
            </div>

            <div class="form-group">
              <label for="email"><i class="fas fa-envelope"></i> Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="example@email.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="email"><i class="fas fa-envelope"></i> Công ty</label>
              <input
                type="text"
                id="company"
                name="company"
                placeholder="Linkcare"
                required
              />
            </div>

            <div class="form-group">
              <label for="email"
                ><i class="fas fa-envelope"></i> Chức danh</label
              >
              <input
                type="text"
                id="title"
                name="title"
                placeholder="CEOCEO"
                required
              />
            </div>
            <button
              type="submit"
              access="false"
              id="button-service-submit"
              class="btn-register-submit"
            >
              Đăng ký ngay
            </button>

            <p class="login-link">
              Đã có tài khoản?
              <a href="#" class="toggle-to-login">Đăng nhập ngay</a>
            </p>
          </form>
          <div class="duplicateMessage"></div>

          <p class="returnMessage mt-3"></p>
        </div>
      </div>
    </div>
  </div>
